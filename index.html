<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Q4 Drill 1</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- External CSS -->
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <div class="container d-flex flex-column align-items-center min-vh-100 py-5">
    <!-- Heading -->
    <h1 class="mb-3">🌿 GO GREEN Consumption Classifier</h1>

    <!-- Description -->
    <p class="text-center">
        Enter your electricity usage (kWh) to determine your consumption level and help promote an eco-friendly lifestyle 🌍
    </p>

    <div class="card p-4 eco-card text-center">

        <img src="https://i.pinimg.com/736x/49/f1/94/49f1944178917a35c4c7f32532191820.jpg"
             class="eco-img mb-3">

        <h2 id="kWh">kWh</h2>

        <!-- Input -->
        <input type="text" id="consumption" class="form-control my-2"
               placeholder="Enter kWh consumption">

        <!-- Button -->
        <button class="btn eco-btn mt-2" onclick="check_class()">
            Check Classification
        </button>

        <!-- Output -->
        <p id="message1" class="mt-3"></p>

    </div>

    <!-- External Link -->
    <p class="mt-3">
        Learn more about saving energy:
        <a href="https://www.energy.gov/" target="_blank">Visit Energy.gov</a>
    </p>

</div>

<!-- External JS -->
<script src="main.js"></script>

</body>
</html>
